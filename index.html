<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta -->
    <title>Dexverse — Pokédex App | Search All Pokémon, Stats & Evolutions</title>
    <meta
      name="description"
      content="Dexverse is a free Pokédex app for Android. Search all 1000+ Pokémon by name, type, ability, or generation. Browse stats, evolution chains, movesets, and build your dream team. Download free on Google Play."
    />
    <meta
      name="keywords"
      content="pokemon, pokedex, pokemon app, pokemon search, pokemon stats, pokemon evolution, pokemon types, pokemon abilities, pokemon moves, pokemon game, pokemon trainer, dexverse, all pokemon, pokemon android app, free pokedex"
    />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <meta name="author" content="Dexverse" />
    <link rel="canonical" href="https://dexverse.in/" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Dexverse" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:title" content="Dexverse — Pokédex App | Search All Pokémon" />
    <meta
      property="og:description"
      content="Search all 1000+ Pokémon by name, type, ability, or generation. Browse stats, evolutions, and build your team. Free Pokédex app for Android."
    />
    <meta
      property="og:image"
      content="https://dexverse.in/og-banner.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Dexverse Pokédex App" />
    <meta property="og:url" content="https://dexverse.in/" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Dexverse — Pokédex App | Search All Pokémon" />
    <meta
      name="twitter:description"
      content="Search all 1000+ Pokémon by name, type, ability, or generation. Free Pokédex app for Android."
    />
    <meta
      name="twitter:image"
      content="https://dexverse.in/og-banner.png"
    />
    <meta name="twitter:site" content="@dexverse_app" />

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebSite",
          "@id": "https://dexverse.in/#website",
          "name": "Dexverse",
          "url": "https://dexverse.in/",
          "description": "A complete Pokédex app — search all 1000+ Pokémon by name, type, ability, or generation.",
          "potentialAction": {
            "@type": "SearchAction",
            "target": {
              "@type": "EntryPoint",
              "urlTemplate": "https://dexverse.in/?q={search_term_string}"
            },
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "MobileApplication",
          "@id": "https://dexverse.in/#app",
          "name": "Dexverse — Pokédex App",
          "description": "Dexverse is a free Pokédex app for Android. Search all 1000+ Pokémon by name, type, ability, or generation. Browse stats, evolution chains, and movesets.",
          "url": "https://dexverse.in/",
          "downloadUrl": "https://play.google.com/store/apps/details?id=com.aditya1875.pokeverse.play",
          "installUrl": "https://play.google.com/store/apps/details?id=com.aditya1875.pokeverse.play",
          "applicationCategory": "GameApplication",
          "operatingSystem": "Android",
          "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "USD"
          },
          "aggregateRating": {
            "@type": "AggregateRating",
            "ratingValue": "4.8",
            "bestRating": "5",
            "ratingCount": "8000"
          },
          "featureList": [
            "Complete Pokédex with 1000+ Pokémon",
            "Smart search by name, type, ability, generation",
            "Pokémon stats, evolution chains, and movesets",
            "Advanced filters by type, stats, rarity",
            "Personal favorites collection",
            "Offline support"
          ]
        },
        {
          "@type": "Organization",
          "@id": "https://dexverse.in/#organization",
          "name": "Dexverse",
          "url": "https://dexverse.in/",
          "logo": "https://dexverse.in/favicon.ico",
          "sameAs": [
            "https://github.com/Dev-Aditya-More/PokeVerse"
          ]
        }
      ]
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
